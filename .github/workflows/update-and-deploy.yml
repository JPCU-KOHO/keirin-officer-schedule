name: Update and deploy schedule

on:
  workflow_dispatch:
  schedule:
    # 05:07 JST (UTC 20:07 on the preceding day). :00を避けて遅延を抑える。
    - cron: "7 20 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Collect the latest race information
        run: |
          mkdir -p tmp public/data
          python work/keirin_status.py "支部長・代行・副支部長一覧_20260709.xlsx" --output tmp/keirin-status.xlsx
          python work/export_keirin_status_json.py tmp/keirin-status.xlsx --date "$(TZ=Asia/Tokyo date +%F)" --output public/data/keirin-status.json
          python work/render_static_site.py --data public/data/keirin-status.json --output public/index.html
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
